name: build-layers
on:
  push:
    branches: [master]
jobs:
  build-layer:
    if: 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - id: opencode
            pkg: opencode-ai
          - id: claude
            pkg: "@anthropic-ai/claude-code"
          - id: kilo
            pkg: "@kilocode/cli"
          - id: codex
            pkg: "@openai/codex"
      fail-fast: false
    steps:
      - run: echo disabled
