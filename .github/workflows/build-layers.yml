name: Build layer WASMs
on:
  workflow_dispatch:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build-layer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: opencode
            pkg: opencode-ai
            label: OpenCode AI
          - id: claude
            pkg: "@anthropic-ai/claude-code"
            label: Claude Code
          - id: kilo
            pkg: "@kilocode/cli"
            label: Kilo Code
          - id: codex
            pkg: "@openai/codex"
            label: Codex
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install c2w
        run: |
          curl -L https://github.com/container2wasm/container2wasm/releases/download/v0.8.4/container2wasm-v0.8.4-linux-amd64.tar.gz | tar xz
          sudo mv c2w /usr/local/bin/
      - name: Build Docker image
        run: |
          mkdir -p /home/runner/tmp
          printf 'FROM node:23-alpine\nRUN npm install -g ${{ matrix.pkg }}\n' > /home/runner/tmp/Dockerfile
          docker build -t layer-${{ matrix.id }}:latest /home/runner/tmp
      - name: Convert to WASM
        env:
          TMPDIR: /home/runner/tmp
        run: |
          mkdir -p containers
          c2w --build-arg=WASI_NET=browser layer-${{ matrix.id }}:latest /home/runner/layer-${{ matrix.id }}.wasm
          split -b 50000000 /home/runner/layer-${{ matrix.id }}.wasm /home/runner/layer_${{ matrix.id }}_chunk_
          i=0
          for f in /home/runner/layer_${{ matrix.id }}_chunk_*; do
            printf -v n '%02d' $i
            cp "$f" "containers/layer-${{ matrix.id }}${n}.wasm"
            i=$((i+1))
          done
          ls containers/layer-${{ matrix.id }}*.wasm | wc -l > containers/layer-${{ matrix.id }}.chunks
          echo "Built $(cat containers/layer-${{ matrix.id }}.chunks) chunks for ${{ matrix.id }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: layer-${{ matrix.id }}
          path: containers/layer-${{ matrix.id }}*

  write-manifest:
    if: github.actor != 'github-actions[bot]'
    needs: build-layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: containers
          merge-multiple: true
      - name: Write layers.json
        run: |
          node - <<'JSEOF'
          const fs = require('fs');
          const entries = [
            { id: 'opencode', name: 'opencode-ai', label: 'OpenCode AI' },
            { id: 'claude', name: '@anthropic-ai/claude-code', label: 'Claude Code' },
            { id: 'kilo', name: '@kilocode/cli', label: 'Kilo Code' },
            { id: 'codex', name: '@openai/codex', label: 'Codex' },
          ];
          const layers = [];
          for (const e of entries) {
            const cf = 'containers/layer-' + e.id + '.chunks';
            if (!fs.existsSync(cf)) continue;
            const chunks = parseInt(fs.readFileSync(cf, 'utf8').trim(), 10);
            layers.push({ id: e.id, name: e.name, label: e.label, chunks });
          }
          fs.writeFileSync('containers/layers.json', JSON.stringify(layers, null, 2));
          console.log('layers.json:', JSON.stringify(layers));
          JSEOF
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin master
          git reset --soft origin/master
          git add containers/
          git commit -m "build: layer WASMs and layers.json" || echo "nothing to commit"
          git push origin HEAD:master

  deploy-pages:
    if: github.actor != 'github-actions[bot]'
    needs: write-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
