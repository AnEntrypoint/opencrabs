name: build-layers
on:
  push:
    branches: [master]
jobs:
  build-layer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - id: opencode
            pkg: opencode-ai
          - id: claude
            pkg: "@anthropic-ai/claude-code"
          - id: kilo
            pkg: "@kilocode/cli"
          - id: codex
            pkg: "@openai/codex"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: install c2w
        run: |
          curl -sSL https://github.com/ktock/container2wasm/releases/download/v0.8.4/container2wasm-v0.8.4-linux-amd64.tar.gz | tar -xz
          sudo mv c2w /usr/local/bin/c2w
      - name: build layer wasm
        run: |
          mkdir -p workspace
          if [ "${{ matrix.id }}" = "opencode" ]; then
            printf 'FROM node:23-alpine AS build\nRUN npm install -g ${{ matrix.pkg }} --no-fund --no-audit && npm cache clean --force\nFROM alpine:3.20\nCOPY --from=build /usr/local/lib/node_modules/opencode-ai/ /usr/local/lib/node_modules/opencode-ai/\nCOPY --from=build /usr/local/bin/opencode /usr/local/bin/opencode\n' > workspace/Dockerfile
          else
            printf 'FROM node:23-alpine\nRUN npm install -g ${{ matrix.pkg }} --no-fund --no-audit && npm cache clean --force\n' > workspace/Dockerfile
          fi
          docker build -t layer-${{ matrix.id }}:latest workspace/
          c2w --build-arg=WASI_NET=browser layer-${{ matrix.id }}:latest workspace/out.wasm
          ls -la workspace/out.wasm
      - name: split wasm
        run: |
          rm -f containers/layer-${{ matrix.id }}*.wasm
          split -b 50M -a 2 -d workspace/out.wasm layer_chunk_
          for f in layer_chunk_??; do mv "$f" "containers/layer-${{ matrix.id }}$(echo $f | sed 's/layer_chunk_//').wasm"; done
          ls containers/layer-${{ matrix.id }}*.wasm | wc -l > containers/layer-${{ matrix.id }}.chunks
          rm -rf workspace
      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          for i in 1 2 3 4 5; do
            git fetch origin master
            git reset --soft origin/master
            git restore --staged .
            git add "containers/layer-${{ matrix.id }}"*.wasm "containers/layer-${{ matrix.id }}.chunks"
            git diff --cached --quiet || git commit -m "build: ${{ matrix.id }} layer WASM chunks"
            git push origin HEAD:master && break
            echo "push failed, retrying ($i)..."
            sleep $((i * 5))
          done
