name: build-wasm
on:
  push:
    branches: [master]
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: install c2w
        run: |
          curl -sSL https://github.com/ktock/container2wasm/releases/download/v0.8.4/container2wasm-v0.8.4-linux-amd64.tar.gz | tar -xz
          sudo mv c2w /usr/local/bin/c2w
      - name: build alpine wasm
        run: |
          c2w --build-arg=WASI_NET=browser --build-arg=VM_MEMORY_SIZE_MB=512 alpine:3.20 out.wasm
          ls -la out.wasm
      - name: split wasm
        run: |
          rm -f containers/nodejs*.wasm
          split -b 50M -a 2 -d out.wasm nodejs_chunk_
          for f in nodejs_chunk_??; do mv "$f" "containers/$(echo $f | sed 's/nodejs_chunk_/nodejs/').wasm"; done
          ls containers/nodejs*.wasm | wc -l > containers/nodejs.chunks
          rm -f out.wasm
      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin master
          git reset --soft origin/master
          git restore --staged .
          git add containers/nodejs*.wasm containers/nodejs.chunks
          git diff --cached --quiet || git commit -m "build: alpine WASM chunks"
          git push origin HEAD:master
