name: Build nodejs WASM
on:
  workflow_dispatch:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install c2w
        run: |
          curl -L https://github.com/container2wasm/container2wasm/releases/download/v0.8.4/container2wasm-v0.8.4-linux-amd64.tar.gz | tar xz
          sudo mv c2w /usr/local/bin/
      - name: Build WASM
        env:
          TMPDIR: /home/runner/tmp
        run: |
          mkdir -p /home/runner/tmp containers
          c2w --build-arg=WASI_NET=browser node:23-alpine /home/runner/nodejs.wasm
          split -b 50000000 /home/runner/nodejs.wasm /home/runner/nodejs_chunk_
          i=0
          for f in /home/runner/nodejs_chunk_*; do
            printf -v n '%02d' $i
            cp "$f" "containers/nodejs${n}.wasm"
            i=$((i+1))
          done
          ls containers/nodejs*.wasm | wc -l > containers/nodejs.chunks
          echo "Built $(cat containers/nodejs.chunks) chunks"
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin master
          git reset --soft origin/master
          git add containers/nodejs*.wasm containers/nodejs.chunks
          git commit -m "build: node:23-alpine WASM chunks" || echo "nothing to commit"
          git push origin HEAD:master
