<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rippleui@1.12.1/dist/css/styles.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.app-layout{display:flex;height:100vh}
.sidebar{width:240px;background:#16213e;border-right:1px solid #2a2a4a;display:flex;flex-direction:column}
.sidebar-brand{padding:16px 20px;font-size:18px;font-weight:700;border-bottom:1px solid #2a2a4a;color:#7c3aed}
.sidebar-nav{flex:1;padding:8px}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;color:#a0a0c0;text-decoration:none;margin-bottom:2px;transition:all .15s}
.sidebar-link:hover{background:#1a1a3e;color:#e0e0e0}
.sidebar-link.active{background:#7c3aed22;color:#7c3aed;font-weight:600}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#16213e;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.page-area{flex:1;overflow-y:auto;padding:24px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.online{background:#22c55e}
.status-dot.offline{background:#ef4444}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{max-width:70%;padding:12px 16px;border-radius:12px;line-height:1.5}
.chat-bubble.user{align-self:flex-end;background:#7c3aed;color:white}
.chat-bubble.assistant{align-self:flex-start;background:#2a2a4a}
.chat-input-bar{display:flex;gap:8px;padding:16px;border-top:1px solid #2a2a4a;background:#16213e}
.tool-trace{background:#1a1a3e;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;font-size:13px;font-family:monospace;color:#a78bfa}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#606080}
</style>
<script type="importmap">
{"imports":{"webjsx":"https://cdn.jsdelivr.net/npm/webjsx@0.0.42/dist/index.js","webjsx/jsx-runtime":"https://cdn.jsdelivr.net/npm/webjsx@0.0.42/dist/jsx-runtime.js"}}
</script>
</head>
<body>
<div id="app"></div>
<script type="module" src="app.js"></script>
</body>
</html>
